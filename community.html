<!DOCTYPE html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/community.css">
<link rel="stylesheet" href="css/navbar.css">
</head>

<body>

<div id="navbar-container"></div>

<script src="javaScript/lan.js"></script>
<script src="javaScript/loadNavbar.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        loadNavbar()
    })
</script>

<main>
    <section class="title-bar">
        <h1 data-i18n="community.title">K3 Community</h1>
    </section>
</main>



<section class="hv-accordion">

    <!-- BAR AG -->
    <details>
        <summary data-i18n="community.bar.title">Bar AG</summary>

        <div class="accordion-content">

        <div class="accordion-text">
        <p data-i18n="community.bar.text1"></p>
        <p data-i18n="community.bar.text2"></p>
        </div>

        <div class="accordion-image">
        <img src="images/Map_K3.png" alt="Bar AG">
        </div>

        </div>
    </details>


    <!-- GARDEN AG -->
    <details>
        <summary data-i18n="community.garden.title">Garden AG</summary>

        <div class="accordion-content">

        <div class="accordion-text">
        <p data-i18n="community.garden.text1"></p>
        <p data-i18n="community.garden.text2"></p>
        </div>

        <div class="accordion-image">
        <img src="images/Map_K3.png" alt="Garden AG">
        </div>

        </div>
    </details>

    <details>
        <summary data-i18n="community.new.title"></summary>
            <div class="accordion-content"> 

                <div class="accordion-text">
                    <p data-i18n="community.new.text"></p>

                    <ul>
                        <li data-i18n="community.new.esp1"></li>
                        <li data-i18n="community.new.esp2"></li>
                        <li data-i18n="community.new.esp3"></li>
                    </ul>
                </div>

                <div class="accordion-image">
                    <a href="https://www.studierendenwerk-mainz.de/wohnen/wohnheime/k3" 
                        target="_blank" 
                        rel="noopener noreferrer"
                        data-i18n-title="images.commonroom.title"
                        data-i18n-tooltip="images.commonroom.title">
                        
                        <figure>
                            <img src="images/old_bar.jpg" 
                                data-i18n-alt="images.commonroom.alt">
                        </figure>
                    </a>
                </div>

            </div>
    </details>

</section>


</body>
</html>
