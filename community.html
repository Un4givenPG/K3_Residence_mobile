<!DOCTYPE html>
<head>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/community.css">
<link rel="stylesheet" href="css/navbar.css">
</head>

<body>

<div id="navbar-container"></div>

<script src="javaScript/lan.js"></script>
<script src="javaScript/loadNavbar.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        loadNavbar()
    })
</script>

<main>
    <section class="title-bar">
        <h1 data-i18n="community.title">K3 Community</h1>
    </section>
</main>



<section class="hv-accordion">

<!-- BAR AG -->
<details>
<summary data-i18n="community.bar.title">Bar AG</summary>

<div class="accordion-content">

<div class="accordion-text">
<p data-i18n="community.bar.text1"></p>
<p data-i18n="community.bar.text2"></p>
</div>

<div class="accordion-image">
<img src="images/Map_K3.png" alt="Bar AG">
</div>

</div>
</details>


<!-- GARDEN AG -->
<details>
<summary data-i18n="community.garden.title">Garden AG</summary>

<div class="accordion-content">

<div class="accordion-text">
<p data-i18n="community.garden.text1"></p>
<p data-i18n="community.garden.text2"></p>
</div>

<div class="accordion-image">
<img src="images/Map_K3.png" alt="Garden AG">
</div>

</div>
</details>


<!-- GAMES AG -->
<details>
<summary data-i18n="community.games.title">Games AG</summary>

<div class="accordion-content">

<div class="accordion-text">
<p data-i18n="community.games.text1"></p>
<p data-i18n="community.games.text2"></p>
</div>

<div class="accordion-image">
<img src="images/games.jpg" alt="Games AG">
</div>

</div>
</details>


<!-- TABLE TENNIS AG -->
<details>
<summary data-i18n="community.tt.title">Table Tennis AG</summary>

<div class="accordion-content">

<div class="accordion-text">
<p data-i18n="community.tt.text1"></p>
<p data-i18n="community.tt.text2"></p>
</div>

<div class="accordion-image">
<img src="images/tabletennis.jpg" alt="Table Tennis">
</div>

</div>
</details>

</section>


</body>
</html>
