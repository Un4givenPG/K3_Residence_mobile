<!DOCTYPE html>
<head>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/navbar.css">
<link rel="stylesheet" href="css/map.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>
<main>
    <section class="title-bar">
        <h1 data-i18n="map.title">Map</h1>
    </section>
</main>


<div id="navbar-container"></div>

<script src="javaScript/lan.js"></script>
<script src="javaScript/loadNavbar.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        loadNavbar()
    })
</script>

<div class="map-layout">

<div class="map-sidebar">

    <h2 data-i18n="map.places">Places</h2>
    <div class="category k3">
        <ul>
            <li onclick="focusMarker('k3')">K3</li>
        </ul>
    </div>

    <div class="category transport">
        <h4 data-i18n="map.transport">Transport</h4>
        <ul>
            <li onclick="focusMarker('arena')" data-i18n="map.arena">Arena</li>
            <li onclick="focusMarker('campusbruecke')" data-i18n="map.campusbruecke">Campusbrücke</li>
            <li onclick="focusMarker('hsmainz')" data-i18n="map.hsmainz">Hochschule Mainz</li>
            <li onclick="focusMarker('kisselberg')" data-i18n="map.kisselberg">Kisselberg</li>
        </ul>
    </div>

    <div class="category service">
        <h4 data-i18n="map.service">Service</h4>
        <ul>
            <li onclick="focusMarker('sw')" data-i18n="map.sw">Studierendenwerk</li>
        </ul>
    </div>

    <div class="category groceries">
        <h4 data-i18n="map.groceries">Groceries</h4>
        <ul>

            <li onclick="focusMarker('aldi')" data-i18n="map.aldi">Aldi</li>
            <li onclick="focusMarker('kaufland')" data-i18n="map.kaufland">Kaufland</li>
            <li onclick="focusMarker('lidl')" data-i18n="map.lidl">Lidl</li>
            <li onclick="focusMarker('rewe')" data-i18n="map.rewe">Rewe</li>
        </ul>
    </div>

    <div class="category drugstore">
        <h4 data-i18n="map.drugstore">Drugstore</h4>
        <ul>
            <li onclick="focusMarker('dm')" data-i18n="map.dm">DM</li>
            <li onclick="focusMarker('mueller')" data-i18n="map.mueller">Müller</li>
        </ul>
    </div>

    <div class="category pharmacy">
        <h4 data-i18n="map.pharmacy">Pharmacy</h4>
        <ul>
            <li onclick="focusMarker('apo')" data-i18n="map.apo">Sonnen Apotheke</li>
        </ul>
    </div>

</div>

<div id="map"></div>

</div>

<script src="javaScript/map.js"></script>
</body>
</html>
